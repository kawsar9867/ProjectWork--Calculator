<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>|| Calculator-Project ||</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 min-h-screen flex items-center justify-center"
  >
    <div class="bg-gray-900 p-6 rounded-b-3xl rounded-t-2xl shadow-2xl w-80">
      <input
        type="text"
        id="display"
        readonly
        class="w-full h-20 mb-5 rounded-xl border bg-gray-800 text-white text-right text-3xl px-4 outline-none"
      />

      <div class="grid grid-cols-4 gap-3">
        <button
          onclick="clearDisplay()"
          class="h-16 rounded-2xl bg-red-500 hover:bg-red-600 active:scale-95 transition text-white text-xl font-bold"
        >
          AC
        </button>

        <button
          onclick="deleteLast()"
          class="h-16 rounded-2xl bg-yellow-500 hover:bg-yellow-600 active:scale-95 transition text-white text-xl font-bold"
        >
          DEL
        </button>

        <button
          onclick="handlePercentage()"
          class="h-16 rounded-2xl bg-orange-500 hover:bg-orange-600 active:scale-95 transition text-white text-xl font-bold"
        >
          %
        </button>

        <button
          onclick="appendValue('/')"
          class="h-16 rounded-2xl bg-orange-500 hover:bg-orange-600 active:scale-95 transition text-white text-xl font-bold"
        >
          ÷
        </button>

        <button
          onclick="appendValue('7')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          7
        </button>

        <button
          onclick="appendValue('8')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          8
        </button>

        <button
          onclick="appendValue('9')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          9
        </button>

        <button
          onclick="appendValue('*')"
          class="h-16 rounded-2xl bg-orange-500 hover:bg-orange-600 active:scale-95 transition text-white text-2xl"
        >
          ×
        </button>

        <button
          onclick="appendValue('4')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          4
        </button>

        <button
          onclick="appendValue('5')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          5
        </button>

        <button
          onclick="appendValue('6')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          6
        </button>

        <button
          onclick="appendValue('-')"
          class="h-16 rounded-2xl bg-orange-500 hover:bg-orange-600 active:scale-95 transition text-white text-2xl"
        >
          −
        </button>

        <button
          onclick="appendValue('1')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          1
        </button>

        <button
          onclick="appendValue('2')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          2
        </button>

        <button
          onclick="appendValue('3')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          3
        </button>

        <button
          onclick="appendValue('+')"
          class="h-16 rounded-2xl bg-orange-500 hover:bg-orange-600 active:scale-95 transition text-white text-2xl"
        >
          +
        </button>

        <button
          onclick="appendValue('0')"
          class="col-span-2 h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          0
        </button>

        <button
          onclick="appendValue('.')"
          class="h-16 rounded-2xl bg-gray-700 hover:bg-gray-600 active:scale-95 transition text-white text-2xl"
        >
          .
        </button>

        <button
          onclick="calculate()"
          class="h-16 rounded-2xl bg-green-500 hover:bg-green-600 active:scale-95 transition text-white text-2xl font-bold"
        >
          =
        </button>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");

      function appendValue(value) {
        display.value += value;
      }

      function clearDisplay() {
        display.value = "";
      }

      function deleteLast() {
        display.value = display.value.slice(0, -1);
      }

      function handlePercentage() {
        let currentVal = display.value;
        if (currentVal === "") return;

        const parts = currentVal.split(/([\+\-\*\/])/);
        let lastNumberStr = parts[parts.length - 1];

        if (!lastNumberStr || isNaN(lastNumberStr)) return;

        let lastNumber = parseFloat(lastNumberStr);
        let percentageValue;

        if (parts.length >= 3) {
          let firstNumber = parseFloat(parts[0]);
          let operator = parts[1];

          if (operator === "+" || operator === "-") {
            percentageValue = (firstNumber * lastNumber) / 100;
          } else {
            percentageValue = lastNumber / 100;
          }
        } else {
          percentageValue = lastNumber / 100;
        }

        parts[parts.length - 1] = percentageValue;
        display.value = parts.join("");
      }

      function calculate() {
        try {
          if (display.value === "") return;

          const result = Function(
            '"use strict"; return (' + display.value + ")",
          )();
          display.value = Number(result.toFixed(8)).toString();
        } catch {
          display.value = "Error";
        }
      }
    </script>
  </body>
</html>
